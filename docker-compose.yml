# Lancement local : docker compose up --build
# Multi-arch : docker buildx build --platform linux/amd64,linux/arm64 -t bouchon-universel:latest .
services:
  bouchon:
    build:
      context: .
      dockerfile: Dockerfile
    image: bouchon-universel:latest
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BDDConnection: /app/data/BouchonUniversel.db
      Bouchon__CheminFichiers: /app/data/files
      Bouchon__DefautActivation: "true"
      Bouchon__UrlService: ""
      # Authentification admin (facultatif) : renseigner Admin__Username + Admin__PasswordHash
      # (générer le hash : dotnet run --project BouchonUniversel -- hash-password <motdepasse>).
    volumes:
      - bouchon-data:/app/data

volumes:
  bouchon-data:
