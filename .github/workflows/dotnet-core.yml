name: .NET

on:
  push:
    branches:
      - master
      - feature/*
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Debug --no-restore
    - name: Restore tools
      run: dotnet tool restore
    - name: Check for pending EF model changes
      run: dotnet ef migrations has-pending-model-changes --project BouchonUniversel --startup-project BouchonUniversel
    - name: Test
      run: dotnet test --no-build --configuration Debug --verbosity normal
