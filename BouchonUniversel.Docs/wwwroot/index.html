<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bouchon Universel — Documentation</title>
    <base href="/" />
    <script>
        (function () {
            var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', t);
        })();
        function toggleTheme() {
            var next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
        }
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div class="loading-splash">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-body-secondary">Chargement de la documentation…</p>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-0 rounded-0" style="display:none; position:fixed; bottom:0; width:100%; z-index:1080;">
        Une erreur inattendue est survenue.
        <a href="." class="reload alert-link">Recharger</a>
        <span class="dismiss" style="cursor:pointer; float:right;">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
