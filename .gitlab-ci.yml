image: mcr.microsoft.com/dotnet/sdk:10.0

stages:
  - build
  - test

before_script:
  - 'dotnet restore'

build:
  stage: build
  script:
    - 'dotnet build --configuration Debug --no-restore'

migrations-check:
  stage: test
  script:
    - 'dotnet tool restore'
    - 'dotnet ef migrations has-pending-model-changes --project BouchonUniversel --startup-project BouchonUniversel'

vuln-scan:
  stage: test
  script:
    - 'dotnet list package --vulnerable --include-transitive | tee vuln.txt'
    - '! grep -q "has the following vulnerable" vuln.txt'

test:
  stage: test
  script:
    - 'dotnet test --configuration Debug --verbosity normal'
